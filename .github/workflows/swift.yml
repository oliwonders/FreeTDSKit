name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Swift version
      run: swift --version

    - name: Build
      run: swift build -v

    - name: Run unit tests
      run: swift test --filter FreeTDSKitTests
